pools:
  -

spot:
  venues:
    - "Binance"
  #  - "Aster"

futures:
  venues:
    -

version_name: "v0.0.0_test"
strategy_id: 999
strategy_name: "dev strategy"

# ═══════════════════════════════════════════════════════════════════════════════
# Stage 4 — Risk Management (PortfolioOptimizer)
#
# These parameters define the risk envelope that the optimizer enforces on
# every submit_weights() call.  The constraint pipeline runs in order:
#   1. Rate limit → 2. Symbol filter → 3. Per-asset clip → 4. Exposure scaling
#   → 5. Cash floor → 6. Turnover cap
#
# All weight values are fractions of total portfolio value (0.25 = 25%).
# ═══════════════════════════════════════════════════════════════════════════════
risk:
  # ── Per-asset weight bounds ──
  max_weight_per_asset: 0.25          # no single asset > 25% of portfolio
  min_weight_per_asset: 0.0           # floor per asset (0 = long-only is fine)

  # ── Portfolio-level exposure ──
  max_total_exposure: 1.0             # sum(|weights|); 1.0 = fully invested, no leverage
  min_cash_weight: 0.05              # always keep >= 5% in cash/stablecoins

  # ── Turnover control ──
  max_turnover_per_rebalance: 0.5     # max sum(|delta_w|) per rebalance cycle

  # ── Leverage & shorts (futures expansion) ──
  max_leverage: 1.0                   # max gross leverage (1.0 = spot-only)
  max_short_weight: 0.0              # max short weight per asset (0 = no shorts)

  # ── Notional filters ──
  min_order_notional: 10.0            # skip orders below $10 notional
  max_order_notional: 100000.0        # cap single order at $100k

  # ── Delta threshold ──
  
  min_weight_delta: 0.005             # skip rebalance legs with < 0.5% weight change
  
  # ── Rate limiting ──
  min_rebalance_interval_ms: 60000    # minimum 60s between rebalance cycles

  # ── Symbol filters ──
  # allowed_symbols: null = all symbols allowed
  # Set to a list to whitelist: ["ETHUSDT", "BTCUSDT", "SOLUSDT"]
  allowed_symbols: null

  # Explicit blacklist — these symbols will never receive weight
  blocked_symbols: []


# ═══════════════════════════════════════════════════════════════════════════════
# Stage 3-5 — Portfolio (shared state across all pipeline stages)
#
# The Portfolio tracks positions, cash, weights, and risk metrics.  It is
# event-driven after start() — kline events update mark prices and weights,
# balance events sync cash via deltas.
# ═══════════════════════════════════════════════════════════════════════════════
portfolio:
  max_history: 10000                  # max fills retained in memory (ring buffer)
  snapshot_interval_s: 300            # save portfolio snapshot every N seconds (0 = disabled)


# ═══════════════════════════════════════════════════════════════════════════════
# Stage 5 — Execution Engine
#
# Converts validated weights into exchange orders.  Sells execute first to
# free quote currency, then buys.  The weight-delta threshold from the risk
# section is shared with the execution engine automatically.
# ═══════════════════════════════════════════════════════════════════════════════
execution:
  default_order_type: "MARKET"        # "MARKET" or "LIMIT"
  default_venue: "Binance"            # primary venue for order routing


# ═══════════════════════════════════════════════════════════════════════════════
# Strategy
#
# Strategy-level configuration passed through to the SpotStrategy base class.
# ═══════════════════════════════════════════════════════════════════════════════
strategy:
  max_heavy_workers: 4                # ProcessPoolExecutor workers for run_heavy()


# ═══════════════════════════════════════════════════════════════════════════════
# Database
