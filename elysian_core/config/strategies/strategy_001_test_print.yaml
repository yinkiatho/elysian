# ═══════════════════════════════════════════════════════════════════════════════
# strategy_001_event_driven.yaml — Per-strategy configuration
#
# Each strategy gets its own YAML file.  These are loaded by StrategyRunner
# alongside trading_config.yaml and merged into AppConfig.strategies.
#
# MandatoryFields:
#   strategy_id            — unique integer, used for shadow book and logging
#   strategy_name          — human-readable identifier
#   class         — Python class name for instantation (e.g. "MyStrategy" for elysian_core.strategy.my_strategy.MyStrategy)
#   asset_type    — "Spot" or "Perpetual"
#   venue         — primary venue: "Binance", "Aster"
#   venues        — list of venues this strategy may trade on
#   allocation    — fraction of total portfolio capital [0.0, 1.0]
#   symbols       — explicit symbol list; empty = loaded from config.json for this venue+asset_type
#   risk_overrides    — overrides on top of venue and global risk (highest priority)
#   execution_overrides — overrides on top of venue and global execution
#   portfolio_overrides — overrides on top of global portfolio config
#   params        — strategy-specific parameters passed to compute_weights / on_start
#   max_heavy_workers — max number of concurrent heavy compute tasks

strategy_id: 1
strategy_name: "test_printing"

log_dir: "logs/{strategy_name}.log"  # relative to project root; created if doesn't exist
class: "elysian_core.strategy.example_strategy_test_print.PrintEventsStrategy"
asset_type: "Spot"
venue: "Binance"
venues:
  - "Binance"

max_heavy_workers: 8

# Symbols — leave empty to load from config.json for this venue+asset_type
symbols: ['BTCUSDT', 'ETHUSDT', 'BNBUSDT'] 

# ── Risk Management for PortfolioOptimizer (StrategyShadowBook level) ──────────────────────────────────────────────
# Only list fields you want to change; omitted fields inherit from venue/global.
risk: {}


# ── Execution overrides ────────────────────────────────────────────────────────
execution_overrides: {}

# ── Portfolio overrides ────────────────────────────────────────────────────────
portfolio_overrides: {}

# ── Strategy-specific parameters ──────────────────────────────────────────────
# Accessible via strategy.strategy_config.params or strategy.cfg.strategies[i].params
params:
  rebalance_interval_s: 60     # minimum seconds between rebalance cycles
